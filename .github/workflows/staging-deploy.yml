name: Nibbl AI Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-1
  IMAGE_TAG: staging

jobs:
  build:
    name: Build & Push Staging Images to ECR
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push all services (staging tag)
        run: |
          REGISTRY='${{ steps.login-ecr.outputs.registry }}'
          # Only the backend exists today; add "ai landing admin" here as those
          # services land in the monorepo.
          for service in backend; do
            docker build -f ./services/$service/Dockerfile --target prod \
              -t "$REGISTRY/nibblai-$service:staging" ./services/$service
            docker push "$REGISTRY/nibblai-$service:staging"
          done

  deploy:
    name: Deploy to Staging EC2
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: SSH to staging EC2 and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /home/ubuntu/nibblai
            export PATH=$PATH:/usr/local/bin
            export REGISTRY='${{ needs.build.outputs.registry }}'
            export IMAGE_TAG='staging'

            aws ecr get-login-password --region us-west-1 \
              | docker login --username AWS --password-stdin "$REGISTRY"

            COMPOSE="docker compose \
              -f deployment/compose/docker-compose.base.yml \
              -f deployment/compose/staging/docker-compose.yml"

            $COMPOSE pull
            $COMPOSE up -d --force-recreate --remove-orphans
            $COMPOSE exec -T backend python manage.py migrate --noinput
