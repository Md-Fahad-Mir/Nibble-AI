name: Nibbl AI CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

# OIDC: lets this workflow request a short-lived token to assume the AWS role.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-1
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── Build & Push to ECR ────────────────────────────────────────────
  build:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/nibblai-backend:latest
            ${{ steps.login-ecr.outputs.registry }}/nibblai-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── AI receipt-OCR service ─────────────────────────────────────────
      - name: Build & push AI service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai
          file: ./services/ai/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/nibblai-ai:latest
            ${{ steps.login-ecr.outputs.registry }}/nibblai-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Future services (uncomment as they are added to the monorepo) ──
      #
      # - name: Build & push landing page
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./services/landing
      #     file: ./services/landing/Dockerfile
      #     push: true
      #     tags: |
      #       ${{ steps.login-ecr.outputs.registry }}/nibblai-landing:latest
      #       ${{ steps.login-ecr.outputs.registry }}/nibblai-landing:${{ github.sha }}
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max
      #
      # - name: Build & push admin dashboard
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./services/admin
      #     file: ./services/admin/Dockerfile
      #     push: true
      #     tags: |
      #       ${{ steps.login-ecr.outputs.registry }}/nibblai-admin:latest
      #       ${{ steps.login-ecr.outputs.registry }}/nibblai-admin:${{ github.sha }}
      #     build-args: |
      #       NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max

  # ─── Deploy to Production (via SSM — no inbound SSH) ────────────────
  deploy:
    name: Deploy to Production via SSM
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy on the instance via SSM Run Command
        run: |
          set -euo pipefail
          REGISTRY='${{ needs.build.outputs.registry }}'
          TAG='${{ github.sha }}'

          # Resolve the running production instance by tag.
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=nibblai-production" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          echo "Target instance: $INSTANCE_ID"

          # Tell SSM to run the on-box deploy script as the ubuntu user.
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Nibbl AI deploy $TAG" \
            --parameters "commands=sudo -u ubuntu env REGISTRY=$REGISTRY IMAGE_TAG=$TAG AWS_REGION=${{ env.AWS_REGION }} bash /home/ubuntu/nibblai/server-deploy.sh" \
            --query Command.CommandId --output text)
          echo "SSM command: $CMD_ID"

          # Wait for completion (waiter returns non-zero on failure).
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true

          echo "::group::Deploy stdout"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
          echo "::endgroup::"
          echo "::group::Deploy stderr"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
          echo "::endgroup::"

          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text)
          echo "Deploy status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
