# =============================================================================
# NibblAI backend — DEVELOPMENT stack.
#
#   docker compose -f docker-compose.dev.yml up --build
#
# Features:
#   * Django dev server with autoreload (source bind-mounted into the container)
#   * Postgres + Redis started automatically and gated by healthchecks
#   * dev settings (DEBUG=True, browsable API, console email backend)
#   * The image's /app/.venv is preserved via an anonymous volume so the host
#     bind-mount does not shadow the installed dependencies.
# =============================================================================

name: nibblai-dev

services:
  db:
    image: postgres:16
    container_name: nibblai-dev-db
    environment:
      POSTGRES_DB: ${DB_NAME:-nibblai}
      POSTGRES_USER: ${DB_USER:-nibblai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nibblai}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nibblai} -d ${DB_NAME:-nibblai}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nibblai-dev-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: nibblai-backend:dev
    container_name: nibblai-dev-backend
    command: ["runserver"]
    init: true
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.dev
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me-to-a-strong-random-key-at-least-50-chars}
      DEBUG: "True"
      # Talk to the compose services by name (overrides any host values in .env).
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-nibblai}
      DB_USER: ${DB_USER:-nibblai}
      DB_PASSWORD: ${DB_PASSWORD:-nibblai}
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "1"
      RUN_COLLECTSTATIC: "0"
    volumes:
      # Live source for autoreload...
      - .:/app
      # ...but keep the container's installed venv (anonymous volume shadows the
      # bind-mount at this path) and persist generated dirs across rebuilds.
      - /app/.venv
      - dev_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  dev_pgdata:
  dev_media:
