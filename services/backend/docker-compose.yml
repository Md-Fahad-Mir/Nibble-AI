# Convenience Postgres for local development.
# Usage: docker compose up -d db
# (Only the database runs in Docker; the Django app runs on the host via uv.)

services:
  db:
    image: postgres:16
    container_name: nibblai-postgres
    environment:
      POSTGRES_DB: nibblai
      POSTGRES_USER: nibblai
      POSTGRES_PASSWORD: nibblai
    ports:
      - "5432:5432"
    volumes:
      - nibblai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nibblai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nibblai_pgdata:
