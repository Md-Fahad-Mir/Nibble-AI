# =============================================================================
# NibblAI backend — PRODUCTION stack.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Secrets are read from the host environment (populate them from your secret
# manager / CI, NOT from a committed .env). Required variables use the
# ${VAR:?message} form so the stack refuses to start if they are missing.
#
# This file runs Postgres and Redis as containers for a self-hosted single-host
# deployment. For managed Postgres/Redis (RDS, Cloud SQL, ElastiCache), drop the
# `db`/`redis` services and point DATABASE_URL / REDIS_URL at the managed
# endpoints instead.
# =============================================================================

name: nibblai-prod

x-backend-env: &backend-env
  DJANGO_SETTINGS_MODULE: core.settings.prod
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required in production}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required (e.g. api.nibblai.app)}
  DEBUG: "False"
  DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-nibblai}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-nibblai}}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
  SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-True}
  # Email (use a transactional provider, not personal Gmail).
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@nibblai.app}
  # Optional integrations (left empty -> deterministic mocks).
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
  FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  db:
    image: postgres:16
    container_name: nibblai-prod-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nibblai}
      POSTGRES_USER: ${POSTGRES_USER:-nibblai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nibblai} -d ${POSTGRES_DB:-nibblai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # Not published to the host; only reachable on the internal compose network.
    expose:
      - "5432"
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7-alpine
    container_name: nibblai-prod-redis
    # Durable-ish cache: append-only on, evict volatile keys under pressure.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - prod_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    expose:
      - "6379"
    deploy:
      resources:
        limits:
          memory: 512m

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    image: nibblai-backend:prod
    container_name: nibblai-prod-backend
    command: ["gunicorn"]
    init: true
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "1"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
    volumes:
      - prod_media:/app/media
    ports:
      # Expose the app to a TLS-terminating reverse proxy / load balancer.
      # Bind to loopback if the proxy runs on the same host: "127.0.0.1:8000:8000".
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "curl", "-fsS", "-H", "X-Forwarded-Proto: https",
         "http://127.0.0.1:8000/api/v1/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g

  # Periodic jobs (the app uses cron-style management commands, not Celery).
  # Runs them on a fixed cadence. Migrations are owned by `backend`, so this
  # service never migrates. For finer per-job schedules, replace with system
  # cron / Kubernetes CronJobs invoking the same image + commands.
  scheduler:
    image: nibblai-backend:prod
    container_name: nibblai-prod-scheduler
    init: true
    command:
      - "/bin/bash"
      - "-c"
      - |
        while true; do
          python manage.py expire_reservations || true
          python manage.py expire_review_sessions || true
          python manage.py release_held_reviews || true
          python manage.py send_notifications || true
          sleep "${SCHEDULER_INTERVAL_SECONDS:-3600}"
        done
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "0"
      WAIT_FOR_REDIS: "1"
    # The image bakes an HTTP healthcheck for the web server; this service does
    # not serve HTTP, so disable it (otherwise it would report "unhealthy").
    healthcheck:
      disable: true
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  prod_pgdata:
  prod_redisdata:
  prod_media:
