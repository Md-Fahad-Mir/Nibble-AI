- hosts: webservers
  become: true

  vars_files:
    - ../group_vars/all.yml
    - "../group_vars/{{ env }}.yml"

  roles:
    - role: docker
      tags: [base, docker]
    - role: nginx
      tags: [base, nginx]
    - role: app-deploy
      tags: [app]
    - role: certbot
      tags: [ssl]
    - role: monitoring
      tags: [monitoring]
