# ─── Nibbl AI Global Variables ──────────────────────────────────────────
# Values shared across all environments. Override in <env>.yml files.

project_name: "{{ lookup('env', 'PROJECT_NAME') | default('nibblai', true) }}"
project_path: "/home/ubuntu/{{ project_name }}"
website_domain: "joinnibbl.com"
certbot_email: "[EMAIL_ADDRESS]"

# Docker Compose files on the remote server. The server mirrors the repo's
# deployment/ subtree, so the SAME base + env-override command that runs
# locally (make up-prod) also runs here — keeping ports, networks, volumes
# and healthchecks (defined in the base file) intact.
compose_base:     "{{ project_path }}/deployment/compose/docker-compose.base.yml"
compose_override: "{{ project_path }}/deployment/compose/{{ env }}/docker-compose.yml"

# ECR registry + tag for ${REGISTRY}/<svc>:${IMAGE_TAG} interpolation in the
# compose files. Pass at deploy time, e.g.:
#   REGISTRY=<acct>.dkr.ecr.us-west-1.amazonaws.com IMAGE_TAG=<sha> make ansible-prod
ecr_registry: "{{ lookup('env', 'REGISTRY') | default('', true) }}"
image_tag:    "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"
aws_region:   "{{ lookup('env', 'AWS_REGION') | default('us-west-1', true) }}"

# Grafana admin password — pass at deploy time: GRAFANA_PASSWORD=... make ...
grafana_password: "{{ lookup('env', 'GRAFANA_PASSWORD') | default('', true) }}"

# Nginx config name
nginx_site_name: "nibblai"

# Services list (used in loops)
services:
  - name: backend
