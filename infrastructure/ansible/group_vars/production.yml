# ─── Nibbl AI Production Overrides ──────────────────────────────────────
env: production
website_domain: "joinnibbl.com"
certbot_email: "admin@joinnibbl.com"   # TODO: set a real, monitored inbox for Let's Encrypt notices

# Grafana admin password is stored in AWS Secrets Manager and fetched at
# deploy time by the monitoring role. See infrastructure/terraform/shared/secrets.tf
# for setup instructions. The fallback grafana_password below is only used if
# Secrets Manager fetch fails (useful for initial bootstrap if the secret
# hasn't been created yet).
grafana_password: ""