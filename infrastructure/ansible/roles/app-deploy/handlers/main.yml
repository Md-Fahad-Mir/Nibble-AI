---
# Provisioning-path deploy: authenticates to ECR via the instance profile,
# then pulls + starts the stack. Best-effort (|| true) so the role can lay
# down files even before the first images exist in ECR — the CI deploy job
# is the strict, gated deploy path.
- name: restart docker compose
  shell: |
    /usr/local/bin/aws ecr get-login-password --region {{ aws_region }} \
      | docker login --username AWS --password-stdin {{ ecr_registry }} || true
    docker compose -f {{ compose_base }} -f {{ compose_override }} pull || true
    docker compose -f {{ compose_base }} -f {{ compose_override }} up -d --force-recreate --remove-orphans || true
  args:
    chdir: "{{ project_path }}"
  become_user: ubuntu
  environment:
    REGISTRY: "{{ ecr_registry }}"
    IMAGE_TAG: "{{ image_tag }}"
