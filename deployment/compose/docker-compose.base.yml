# ─── Base Compose ─────────────────────────────────────────────────────
# Shared service definitions inherited by local/staging/production.
# Usage: docker compose -f docker-compose.base.yml -f <env>/docker-compose.yml up

x-common-env: &common-env
  restart: unless-stopped

services:

  backend:
    <<: *common-env
    container_name: ${PROJECT_NAME:-nibblai}-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      ai:
        condition: service_started
    networks:
      - app-network

  # Internal receipt-OCR microservice. NOT published to the host and NOT routed
  # through nginx — only the backend reaches it at http://ai:8001 on app-network.
  ai:
    <<: *common-env
    container_name: ${PROJECT_NAME:-nibblai}-ai
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

volumes:
  media_data:
    driver: local
  static_data:
    driver: local

networks:
  app-network:
    driver: bridge
