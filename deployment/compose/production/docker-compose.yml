# ─── Production Compose ───────────────────────────────────────────────
# Usage: docker compose -f ../docker-compose.base.yml -f docker-compose.yml up -d
#
# Pulls pre-built images from Docker Hub (pushed by CI/CD).

services:

  backend:
    image: ${REGISTRY}/nibblai-backend:${IMAGE_TAG:-latest}
    env_file:
      - ../environments/.env.production.backend
    restart: always

  ai:
    image: ${REGISTRY}/nibblai-ai:${IMAGE_TAG:-latest}
    env_file:
      - ../environments/.env.production.ai
    restart: always
