# ─── Rate Limiting ────────────────────────────────────────────────────
# Include in http block: include /etc/nginx/conf.d/rate-limiting.conf;

# General API rate limit: 10 requests/sec per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Login/auth rate limit: 5 requests/sec per IP
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# AI analysis rate limit: more restrictive (expensive GPU operations)
limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=3r/s;

# Static assets: more permissive
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=50r/s;
