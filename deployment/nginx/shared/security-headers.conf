# ─── Security Headers ─────────────────────────────────────────────────
# Include in server blocks: include /etc/nginx/conf.d/security-headers.conf;

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# NOTE: cdn.jsdelivr.net is allowed so FastAPI's /docs (Swagger UI) can load.
# A stricter alternative (Stage 10) is to self-host the Swagger assets and
# drop the CDN, or scope this relaxation to the ai vhost only.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' https:;" always;
