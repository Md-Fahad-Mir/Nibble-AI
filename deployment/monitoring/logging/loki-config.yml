auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

# All paths derive from /loki (the mounted, writable volume) — avoids the
# default /wal permission error when running as the non-root loki user.
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

compactor:
  working_directory: /loki/compactor

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  retention_period: 744h
